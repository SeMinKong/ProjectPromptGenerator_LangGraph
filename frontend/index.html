<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 설계 프롬프트 생성기</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- API Key Modal -->
<div id="api-modal" class="modal-backdrop">
  <div class="modal-box">
    <h2>🔑 API 키 입력</h2>
    <p>Upstage API 키를 입력하세요.</p>
    <input id="api-key-input" type="password" placeholder="up_xxxxxxxxxxxx" autocomplete="off" />
    <div id="api-key-error" class="error-msg hidden"></div>
    <button id="api-key-submit" class="btn-primary">시작하기</button>
  </div>
</div>

<!-- Add Dimension Modal -->
<div id="add-dim-modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <h2>영역 추가</h2>
    <label class="field-label">영역 이름
      <input id="dim-name-input" type="text" placeholder="예: 보안 설계" />
    </label>
    <label class="field-label">아이콘 (이모지)
      <input id="dim-icon-input" type="text" placeholder="🔒" maxlength="2" />
    </label>
    <div id="add-dim-error" class="error-msg hidden"></div>
    <div class="modal-actions">
      <button id="add-dim-cancel" class="btn-secondary">취소</button>
      <button id="add-dim-confirm" class="btn-primary">추가</button>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="app" class="app-layout">

  <!-- Left Panel -->
  <aside class="left-panel" id="left-panel">
    <div class="panel-header">
      <span class="logo">🧠 설계 생성기</span>
      <div class="header-right">
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoom-out" title="글자 작게">A−</button>
          <span id="zoom-label">100%</span>
          <button class="zoom-btn" id="zoom-in" title="글자 크게">A+</button>
        </div>
        <span id="ws-status" class="ws-dot" title="연결 안됨"></span>
      </div>
    </div>

    <div id="project-input-section">
      <h3>프로젝트 설명</h3>
      <textarea id="project-desc" placeholder="어떤 프로젝트를 만들고 싶으신가요?&#10;예: 음식 배달 앱을 만들고 싶어" rows="5"></textarea>
      <div id="dim-selection" class="dim-selection">
        <div class="dim-selection-header">
          <span>설계 영역 선택</span>
          <button id="toggle-all-btn" class="btn-tiny">모두 선택</button>
        </div>
        <div id="dim-checkboxes" class="dim-checkboxes"></div>
      </div>
      <button id="start-project-btn" class="btn-primary full-width">설계 시작 →</button>
    </div>

    <div id="progress-section" class="hidden">
      <div class="project-title-display">
        <span class="label">프로젝트</span>
        <p id="project-title-text"></p>
      </div>
      <h3>설계 진행 현황</h3>
      <div id="progress-list" class="progress-list"></div>
      <div class="finalize-area">
        <button id="finalize-btn" class="btn-accent full-width">📄 최종 문서 생성</button>
        <button id="reset-btn" class="btn-ghost full-width">새 프로젝트</button>
      </div>
    </div>
  </aside>

  <!-- Resize Handle Left -->
  <div class="resize-handle" id="resize-left" title="드래그로 패널 크기 조절"></div>

  <!-- Center Panel -->
  <main class="center-panel" id="center-panel">
    <div id="welcome-screen" class="welcome-screen">
      <div class="welcome-content">
        <div class="welcome-icon">🏗️</div>
        <h2>프로젝트 설계 프롬프트 생성기</h2>
        <p>왼쪽에 프로젝트를 설명하면<br>각 설계 영역에서 맞춤형 질문을 통해<br>설계 프롬프트를 자동으로 생성합니다.</p>
      </div>
    </div>

    <div id="chat-area" class="chat-area hidden">
      <div class="tabs-bar">
        <div id="tabs-container" class="tabs-container"></div>
        <button id="add-dim-btn" class="tab-add-btn" title="영역 추가">＋</button>
      </div>
      <div id="chat-window" class="chat-window"></div>
      <div id="chat-input-bar" class="chat-input-bar">
        <textarea id="chat-input" placeholder="답변을 입력하세요..." rows="1"></textarea>
        <button id="send-btn" class="btn-send">전송</button>
      </div>
    </div>
  </main>

  <!-- Resize Handle Right -->
  <div class="resize-handle" id="resize-right" title="드래그로 패널 크기 조절"></div>

  <!-- Right Panel -->
  <aside class="right-panel" id="right-panel">
    <div class="panel-header">
      <span>📋 프롬프트 미리보기</span>
    </div>
    <div id="preview-area" class="preview-area">
      <p class="preview-placeholder">설계가 완료되면 여기에 프롬프트가 표시됩니다.</p>
    </div>
    <div id="preview-actions" class="preview-actions hidden">
      <button id="copy-btn" class="btn-secondary full-width">복사</button>
    </div>
  </aside>

</div>

<script src="/static/app.js"></script>
</body>
</html>
